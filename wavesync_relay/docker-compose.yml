services:
  wavesync-relay:
    image: ghcr.io/pvg13/wavesync-relay:latest
    container_name: wavesync-relay
    restart: unless-stopped
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
    volumes:
      - relay-data:/data
      - type: bind
        source: ./fcm-credentials.json
        target: /data/fcm-credentials.json
        content: |  # This will tell Coolify to create the file (this is not available in a normal docker-compose)
        
      # FCM credentials: configure as a File mount in Coolify Storage UI
      # (destination: /data/fcm-credentials.json). Do NOT add as a bind mount
      # here — Coolify auto-resets file bind mounts to directory mounts on redeploy.
      # - ./AuthKey.p8:/data/apns-key.p8:ro
    environment:
      # Base64-encoded identity keypair. Generate with:
      #   docker compose run --rm wavesync-relay --generate-identity
      # IDENTITY_KEYPAIR: ""
      PUSH_DB: /data/push_tokens.db
      # REQUIRED: Public address to advertise so clients can build relay circuit addresses.
      # Without this, clients get NoAddressesInReservation and WAN sync is broken.
      # For Coolify: set EXTERNAL_ADDRESS in Service > Environment Variables.
      EXTERNAL_ADDRESS: "${EXTERNAL_ADDRESS:-/ip4/YOUR_PUBLIC_IP/tcp/4001}"
      FCM_CREDENTIALS: /data/fcm-credentials.json
      # APNS_KEY_FILE: /data/apns-key.p8
      # APNS_KEY_ID: ""
      # APNS_TEAM_ID: ""
      # APNS_BUNDLE_ID: ""

volumes:
  relay-data:
