# WaveSyncDB relay — Coolify-ready deployment via a prebuilt GHCR image.
#
# In Coolify:
#   1. New Resource → "Docker Compose Empty" (or "Docker Compose from a Git Repository"
#      pointing at this file).
#   2. Paste this YAML into the compose editor.
#   3. Under "Environment Variables" set at minimum:
#          EXTERNAL_ADDRESS   (REQUIRED)
#          IDENTITY_KEYPAIR   (recommended — pins the relay's PeerId across restarts)
#          RELAY_TCP_PORT     (optional, defaults to 4001 — set this when running
#                              multiple relays on the same host for different apps)
#          RELAY_UDP_PORT     (optional, defaults to 4001)
#          FCM_CREDENTIALS / APNS_* (optional, for push wake-up)
#   4. Do NOT set any pre-deployment command. Coolify's own "docker compose pull"
#      runs on the host and picks up :latest from ghcr.io.
#   5. If the GHCR package is private, configure it under Coolify → Sources →
#      "Private Docker Registry" with a GitHub PAT (scope: read:packages).
#
# For local testing: copy .env.example to .env, fill in values, run `docker compose up`.

services:
  wavesync-relay:
    image: ghcr.io/pvg13/wavesync-relay:latest
    restart: unless-stopped
    ports:
      # Coolify host → container. Override RELAY_TCP_PORT/RELAY_UDP_PORT to run
      # multiple relay instances on the same host (one per app).
      - "${RELAY_TCP_PORT:-4001}:4001/tcp"
      - "${RELAY_UDP_PORT:-4001}:4001/udp"
    volumes:
      - relay-data:/data
    environment:
      # REQUIRED: public multiaddr advertised to clients. Without it clients
      # get NoAddressesInReservation and WAN sync is broken.
      # Example: /dns4/relay.roommatesapp.es/tcp/4001
      EXTERNAL_ADDRESS: "${EXTERNAL_ADDRESS}"

      # Recommended: pin the relay's libp2p identity so clients don't have to
      # update their relay multiaddr after every redeploy. Generate once with:
      #   docker run --rm ghcr.io/pvg13/wavesync-relay:latest --generate-identity
      # then paste the IDENTITY_KEYPAIR line into Coolify env vars.
      IDENTITY_KEYPAIR: "${IDENTITY_KEYPAIR:-}"

      # Push notification store (always enable — small overhead, needed for FCM/APNs)
      PUSH_DB: /data/push_tokens.db

      # Push credentials (all optional; set only the ones you use)
      FCM_CREDENTIALS: "${FCM_CREDENTIALS:-}"
      APNS_KEY_FILE: "${APNS_KEY_FILE:-}"
      APNS_KEY_ID: "${APNS_KEY_ID:-}"
      APNS_TEAM_ID: "${APNS_TEAM_ID:-}"
      APNS_BUNDLE_ID: "${APNS_BUNDLE_ID:-}"
      APNS_SANDBOX: "${APNS_SANDBOX:-}"

volumes:
  relay-data:
