# WaveSyncDB relay — Dokploy-ready Docker Compose with file-mounted secrets.
#
# -- Deploy on Dokploy (type: Docker Compose) --
#   1. Source: this Git repo.
#   2. Compose Path: wavesync_relay/docker-compose.yml
#   3. Base Directory (build context): wavesync_relay
#
#   4. Files tab — create one file per secret you use. Dokploy writes each
#      file into the compose directory on the host, alongside this file, so
#      the relative bind mounts below pick them up automatically.
#
#      File Name              Content
#      ---------------------  ---------------------------------------------
#      secrets/fcm.json       FCM service account JSON (full file)
#      secrets/apns.p8        APNs .p8 private key (entire PEM)
#      secrets/identity.b64   base64 identity from `--generate-identity`
#
#      Leave a file out if you don't need that secret — the matching bind
#      mount is commented out and stays disabled.
#
#   5. Environment Variables — set at minimum:
#          EXTERNAL_ADDRESS   (REQUIRED — public multiaddr clients dial)
#      Plus the APNs metadata (KEY_ID / TEAM_ID / BUNDLE_ID) if you use APNs.
#      The *content* env vars (IDENTITY_KEYPAIR / FCM_CREDENTIALS / APNS_KEY_FILE)
#      are already wired below to point at the mounted file paths — you do
#      NOT need to set them in the Dokploy UI.
#
#   6. Hit Redeploy (not Restart) so the container picks up new mounts.
#
# -- Local testing --
#   Place your secrets under ./secrets/ next to this file and run:
#     docker compose up --build
#
# -- Switching to the prebuilt image --
#   Replace the `build:` block with `image: ghcr.io/pvg13/wavesync-relay:latest`.

services:
  wavesync-relay:
    build: .
    restart: unless-stopped
    ports:
      # Long syntax with `mode: host` so dokploy/Swarm publishes these ports
      # directly on the node instead of through the ingress routing mesh.
      # Without `mode: host`, Swarm's mesh SNATs incoming connections (source
      # appears as the 10.0.0.0/24 ingress network), which makes libp2p
      # `identify` report a private IP back to clients; AutoNAT then asks the
      # relay to verify that unreachable address — wasted dials and log noise.
      # `network_mode: host` is NOT a workable alternative: Swarm services
      # don't support it, and dokploy's compose preprocessor injects a
      # `networks:` block that conflicts with it anyway.
      - target: 4001
        published: ${RELAY_TCP_PORT:-4001}
        protocol: tcp
        mode: host
      - target: 4001
        published: ${RELAY_UDP_PORT:-4001}
        protocol: udp
        mode: host
    volumes:
      # Persists /data/identity.key (PeerId) and /data/push_tokens.db.
      - relay-data:/data

      # Secret file mounts — uncomment the ones whose files you've created
      # in Dokploy's Files tab (or dropped into ./secrets/ locally). The
      # `:ro` makes the mount read-only inside the container.
      - ./secrets/identity.b64:/run/secrets/identity.b64:ro
      - ./secrets/fcm.json:/run/secrets/fcm.json:ro
      - ./secrets/apns.p8:/run/secrets/apns.p8:ro
    environment:
      # ---------- REQUIRED ----------
      # Public multiaddr advertised to clients. Without it, clients get
      # NoAddressesInReservation and WAN sync is broken.
      # Examples: /ip4/203.0.113.10/tcp/4001  or  /dns4/relay.example.com/tcp/4001
      EXTERNAL_ADDRESS: "${EXTERNAL_ADDRESS}"

      # ---------- Paths to mounted secret files ----------
      # These point at the bind mounts above. The relay reads the file
      # contents at startup — or falls back to the Dockerfile default
      # (/data/identity.key) if the file is missing and you haven't mounted it.
      IDENTITY_KEYPAIR: /run/secrets/identity.b64
      FCM_CREDENTIALS: /run/secrets/fcm.json
      APNS_KEY_FILE: /run/secrets/apns.p8

      # ---------- APNs metadata (set via Dokploy env vars) ----------
      APNS_KEY_ID: "${APNS_KEY_ID:-}"
      APNS_TEAM_ID: "${APNS_TEAM_ID:-}"
      APNS_BUNDLE_ID: "${APNS_BUNDLE_ID:-}"
      APNS_SANDBOX: "${APNS_SANDBOX:-}"

      # ---------- Push notification store ----------
      PUSH_DB: /data/push_tokens.db
      # PUSH_DEBOUNCE_SECS: 2

      # ---------- Tuning (optional) ----------
      # LISTEN_ADDR: /ip4/0.0.0.0/tcp/4001
      # MAX_CIRCUITS: 256
      # MAX_CIRCUIT_DURATION_SECS: 3600
      # MAX_CIRCUIT_BYTES: 0
      # IDLE_CONNECTION_TIMEOUT_SECS: 300

      # ---------- Logging ----------
      RUST_LOG: "${RUST_LOG:-info}"

volumes:
  relay-data:
