# WaveSyncDB relay — deployment via a prebuilt GHCR image.
#
# The relay crate is standalone (no workspace dependencies), so platforms
# that clone the repo and set the build context to this `wavesync_relay/`
# subdirectory can also build from source using the sibling Dockerfile.
# Swap `image:` below for `build: .` to do that.
#
# Works on Dokploy, Coolify, or plain Docker. All three secret inputs
# (IDENTITY_KEYPAIR, FCM_CREDENTIALS, APNS_KEY_FILE) accept either:
#   * the raw value inline via an env var, OR
#   * a filesystem path to a file containing the value
# so you can paste them as env vars or mount them as files (Dokploy
# "Advanced → Mounts", Coolify "Persistent Storage → File Mount",
# or plain Docker secrets) — whichever your platform prefers.
#
# Required setup:
#   1. Set EXTERNAL_ADDRESS (REQUIRED) — public multiaddr advertised to clients.
#   2. Set IDENTITY_KEYPAIR (recommended) — pins the relay PeerId across restarts.
#      Generate once with:
#          docker run --rm ghcr.io/pvg13/wavesync-relay:latest --generate-identity
#   3. Optional push credentials: FCM_CREDENTIALS / APNS_*.
#   4. Optional port overrides: RELAY_TCP_PORT / RELAY_UDP_PORT (default 4001),
#      useful when running multiple relays on the same host.
#
# Dokploy secret-file example:
#   Mount your FCM JSON as a file at /run/secrets/fcm.json, then set
#       FCM_CREDENTIALS=/run/secrets/fcm.json
#   The relay detects the path and reads the file. Same pattern works for
#   IDENTITY_KEYPAIR and APNS_KEY_FILE.
#
# If the GHCR package is private: configure it under your platform's
# "Private Docker Registry" with a GitHub PAT (scope: read:packages).
#
# For local testing: copy .env.example to .env, fill in values, run `docker compose up`.

services:
  wavesync-relay:
    image: ghcr.io/pvg13/wavesync-relay:latest
    restart: unless-stopped
    ports:
      - "${RELAY_TCP_PORT:-4001}:4001/tcp"
      - "${RELAY_UDP_PORT:-4001}:4001/udp"
    volumes:
      - relay-data:/data
    environment:
      # REQUIRED: public multiaddr advertised to clients. Without it clients
      # get NoAddressesInReservation and WAN sync is broken.
      # Example: /dns4/relay.roommatesapp.es/tcp/4001
      EXTERNAL_ADDRESS: "${EXTERNAL_ADDRESS}"

      # Recommended: pin the relay's libp2p identity. Accepts either the
      # base64 string inline or a path to a mounted secret file.
      IDENTITY_KEYPAIR: "${IDENTITY_KEYPAIR:-}"

      # Push notification store (always enable — small overhead, needed for FCM/APNs)
      PUSH_DB: /data/push_tokens.db

      # Push credentials (all optional). FCM_CREDENTIALS accepts inline JSON
      # or a file path; APNS_KEY_FILE accepts inline PEM or a file path.
      FCM_CREDENTIALS: "${FCM_CREDENTIALS:-}"
      APNS_KEY_FILE: "${APNS_KEY_FILE:-}"
      APNS_KEY_ID: "${APNS_KEY_ID:-}"
      APNS_TEAM_ID: "${APNS_TEAM_ID:-}"
      APNS_BUNDLE_ID: "${APNS_BUNDLE_ID:-}"
      APNS_SANDBOX: "${APNS_SANDBOX:-}"

volumes:
  relay-data:
