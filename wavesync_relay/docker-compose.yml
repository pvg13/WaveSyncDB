# WaveSyncDB relay — Dokploy-ready Docker Compose with file-mounted secrets.
#
# -- Deploy on Dokploy (type: Docker Compose) --
#   1. Source: this Git repo.
#   2. Compose Path: wavesync_relay/docker-compose.yml
#   3. Base Directory (build context): wavesync_relay
#
#   4. Advanced → Mounts — create one File Mount per secret you use. Dokploy
#      stores file-mount content under <project>/files/ on the host (NOT
#      alongside this compose file), so the compose-side bind mounts below
#      would point at the wrong path and conflict. Configure mounts in the
#      dokploy UI instead and leave the compose volumes section minimal:
#
#      File Path              Mount Path                 Content
#      ---------------------  -------------------------  -------------------
#      secrets/fcm.json       /run/secrets/fcm.json      FCM service-account JSON
#      secrets/apns.p8        /run/secrets/apns.p8       APNs .p8 PEM
#      secrets/identity.b64   /run/secrets/identity.b64  base64 identity
#
#      (Skip the rows for secrets you don't use.)
#
#   5. Environment Variables — set at minimum:
#          EXTERNAL_ADDRESS   (REQUIRED — public multiaddr clients dial)
#      Plus the APNs metadata (KEY_ID / TEAM_ID / BUNDLE_ID) if you use APNs.
#      The *content* env vars (IDENTITY_KEYPAIR / FCM_CREDENTIALS / APNS_KEY_FILE)
#      are already wired below to point at the mounted file paths — you do
#      NOT need to set them in the Dokploy UI.
#
#      Alternative for FCM/APNs: paste the JSON / PEM contents directly into
#      FCM_CREDENTIALS / APNS_KEY_FILE env vars (the relay detects inline JSON
#      starting with `{` and inline PEM starting with `-----BEGIN`). That
#      bypasses file mounts entirely and is the simplest dokploy setup.
#
#   6. Hit Redeploy (not Restart) so the container picks up new mounts.
#
# -- Local testing --
#   Place your secrets under ./secrets/ next to this file and run:
#     docker compose up --build
#
# -- Switching to the prebuilt image --
#   Replace the `build:` block with `image: ghcr.io/pvg13/wavesync-relay:latest`.

services:
  wavesync-relay:
    build: .
    restart: unless-stopped
    ports:
      # Long syntax with `mode: host` so dokploy/Swarm publishes these ports
      # directly on the node instead of through the ingress routing mesh.
      # Without `mode: host`, Swarm's mesh SNATs incoming connections (source
      # appears as the 10.0.0.0/24 ingress network), which makes libp2p
      # `identify` report a private IP back to clients; AutoNAT then asks the
      # relay to verify that unreachable address — wasted dials and log noise.
      # `network_mode: host` is NOT a workable alternative: Swarm services
      # don't support it, and dokploy's compose preprocessor injects a
      # `networks:` block that conflicts with it anyway.
      - target: 4001
        published: ${RELAY_TCP_PORT:-4001}
        protocol: tcp
        mode: host
      - target: 4001
        published: ${RELAY_UDP_PORT:-4001}
        protocol: udp
        mode: host
    volumes:
      # Persists /data/identity.key (PeerId) and /data/push_tokens.db.
      - relay-data:/data

      # NO secret bind mounts here. Dokploy's File Mounts (Advanced → Mounts)
      # are the canonical mechanism in production — see the deployment notes
      # at the top of this file. For local docker-compose testing, uncomment
      # the lines below and place real secret files in ./secrets/.
      #
      # - ./secrets/identity.b64:/run/secrets/identity.b64:ro
      # - ./secrets/fcm.json:/run/secrets/fcm.json:ro
      # - ./secrets/apns.p8:/run/secrets/apns.p8:ro
    environment:
      # ---------- REQUIRED ----------
      # Public multiaddr advertised to clients. Without it, clients get
      # NoAddressesInReservation and WAN sync is broken.
      # Examples: /ip4/203.0.113.10/tcp/4001  or  /dns4/relay.example.com/tcp/4001
      EXTERNAL_ADDRESS: "${EXTERNAL_ADDRESS}"

      # ---------- Secret content paths or inline values ----------
      # Each accepts EITHER a filesystem path OR the inline content. The relay
      # auto-detects: FCM/APNS values starting with `{` are treated as inline
      # JSON; APNs PEM starting with `-----BEGIN` is treated as inline PEM;
      # IDENTITY values matching the base64 character set are treated as
      # inline base64 keypair. Anything else is read as a file path.
      #
      # Defaults below point at the file-mount paths used when you configure
      # secrets via dokploy's Advanced → Mounts. To bypass file mounts, set
      # the env var in dokploy's Environment tab to the raw content instead;
      # that override wins because of the `${...:-default}` interpolation.
      IDENTITY_KEYPAIR: "${IDENTITY_KEYPAIR:-/run/secrets/identity.b64}"
      FCM_CREDENTIALS: "${FCM_CREDENTIALS:-/run/secrets/fcm.json}"
      APNS_KEY_FILE: "${APNS_KEY_FILE:-/run/secrets/apns.p8}"

      # ---------- APNs metadata (set via Dokploy env vars) ----------
      APNS_KEY_ID: "${APNS_KEY_ID:-}"
      APNS_TEAM_ID: "${APNS_TEAM_ID:-}"
      APNS_BUNDLE_ID: "${APNS_BUNDLE_ID:-}"
      APNS_SANDBOX: "${APNS_SANDBOX:-}"

      # ---------- Push notification store ----------
      PUSH_DB: /data/push_tokens.db
      # PUSH_DEBOUNCE_SECS: 2

      # ---------- Tuning (optional) ----------
      # LISTEN_ADDR: /ip4/0.0.0.0/tcp/4001
      # MAX_CIRCUITS: 256
      # MAX_CIRCUIT_DURATION_SECS: 3600
      # MAX_CIRCUIT_BYTES: 0
      # IDLE_CONNECTION_TIMEOUT_SECS: 300

      # ---------- Logging ----------
      RUST_LOG: "${RUST_LOG:-info}"

volumes:
  relay-data:
