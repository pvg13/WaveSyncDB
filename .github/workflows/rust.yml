name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Check formatting
      run: cargo fmt --check
    - name: Clippy
      run: cargo clippy -p wavesyncdb -p wavesyncdb_derive -p wavesync_relay -- -D warnings
    - name: Build
      run: cargo build -p wavesyncdb -p wavesyncdb_derive -p wavesync_relay --verbose
    - name: Run unit tests
      run: cargo test -p wavesyncdb --lib -p wavesyncdb_derive -p wavesync_relay --verbose
    - name: Run integration tests
      run: cargo test -p wavesyncdb --test integration -- --test-threads=1
