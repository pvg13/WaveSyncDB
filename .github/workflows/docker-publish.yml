name: Build and publish relay image

on:
  push:
    branches: [main]
    paths:
      - "wavesync_relay/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to apply (in addition to `latest` and commit-sha)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wavesync-relay

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `latest` on main, short sha always, optional manual tag.
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: wavesync_relay/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Persist BuildKit layer cache in GHA's per-repo cache so
          # `cargo-chef cook` and the final `cargo build` both skip work
          # when deps/sources are unchanged. Combined with the cache
          # mounts declared in the Dockerfile, repeat builds land in
          # the low-minute range.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed digest
        # Makes it trivial to verify in Coolify which digest was just
        # published vs. what the host has pulled.
        run: |
          echo "Pushed tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
