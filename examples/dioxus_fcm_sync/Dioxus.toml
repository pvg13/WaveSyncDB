[application]
name = "WaveSyncDB FCM Sync"
default_platform = "android"

# Request background execution for silent push notifications on both
# platforms. dx maps this to `UIBackgroundModes = [remote-notification]`
# in the iOS Info.plist and to the Firebase Cloud Messaging service in
# the Android manifest.
[background]
remote-notifications = true

[android]
min_sdk = 24
target_sdk = 34
identifier = "com.wavesync.mobile_demo"

[ios]
identifier = "com.wavesync.mobile-demo"
# iOS 16 matches the Swift Package's deployment floor. Older values
# (like the rustc default of iOS 10) trigger `___chkstk_darwin` undefined
# symbol errors at link time because modern object files reference
# iOS 13+ runtime helpers.
deployment_target = "16.0"

# APNs sandbox entitlement. dx generates the matching
# entitlements.plist automatically; set to "production" for App Store /
# TestFlight builds.
[ios.entitlements]
aps-environment = "development"
