# Single-file nginx config for the WaveSyncDB website.
#
# The site is a Dioxus client-side-rendered SPA. The `try_files` line is
# what makes deep links (e.g. /docs/quickstart) work: any path that
# doesn't match a real file falls back to /index.html so the Dioxus
# router can take over on the client.

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # WASM mime + gzip. nginx's default mime.types is missing wasm.
    types { application/wasm wasm; }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # Hashed asset filenames produced by `dx build` — fingerprinted by
        # content, so they're safe to cache aggressively forever.
        location /assets/ {
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Everything else falls back to index.html so the Dioxus router
        # owns client-side routing for /docs, /examples, /docs/:slug etc.
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }
    }
}
